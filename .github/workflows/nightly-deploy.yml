name: Deploy Noturno Automatico

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configurar Git
        run: |
          git config user.name "Somma Bot"
          git config user.email "bot@sommagestao.com.br"

      - name: Verificar e fazer merge develop para main
        run: |
          git fetch origin
          AHEAD=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo 0)
          echo "Commits novos no develop: $AHEAD"
          if [ "$AHEAD" -gt "0" ]; then
            git checkout main
            git merge origin/develop --no-ff -m "Deploy automatico $(date +'%d/%m/%Y %H:%M')"
            git push origin main
            echo "Deploy enviado! Railway vai atualizar a producao em alguns minutos."
          else
            echo "Nenhuma mudanca hoje. Producao ja esta atualizada."
          fi
