name: Backup diário PostgreSQL

on:
  schedule:
    - cron: '0 4 * * *'   # todo dia às 04:00 UTC (01:00 Brasília)
  workflow_dispatch:        # permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Criar pasta de backups
        run: mkdir -p backups

      - name: Dump do banco
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FILENAME="backups/backup_$(date +'%Y-%m-%d_%H-%M').sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "Backup salvo: $FILENAME"

      - name: Remover backups com mais de 30 dias
        run: |
          find backups/ -name "*.sql.gz" -mtime +30 -delete
          echo "Limpeza concluída"

      - name: Commit e push do backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f backups/
          git diff --staged --quiet || git commit -m "backup: $(date +'%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
